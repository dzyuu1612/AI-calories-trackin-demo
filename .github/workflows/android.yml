name: Android CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    name: Build & Verify Android App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Create Environment Secrets File
        run: |
          if [ -f .env.example ]; then
            cp .env.example .env
          else
            echo "GEMINI_API_KEY=mock-api-key-for-workflow" > .env
          fi

      - name: Grant Execute Permission to Gradlew
        run: chmod +x gradlew

      - name: Build Debug Application
        run: ./gradlew assembleDebug --no-daemon

      - name: Run Unit & Robolectric Tests
        run: ./gradlew :app:testDebugUnitTest --no-daemon

      - name: Verify Screenshot Tests (Roborazzi)
        run: ./gradlew :app:verifyRoborazziDebug --no-daemon

      - name: Upload Test Reports & Screenshot Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: roborazzi-screenshot-diffs-and-reports
          path: |
            **/build/outputs/roborazzi
            **/build/reports
            **/build/test-results
            **/src/test/screenshots
          if-no-files-found: ignore
